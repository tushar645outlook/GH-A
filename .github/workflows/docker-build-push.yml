name: docker build & push

on: 
 push:
   branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
     - name: code checkout
       uses: actions/checkout@v4

     - name: login to docker hub
       uses: docker/login-action@v3
       with:
         Username: ${{vars.DOCKERHUB_USER}}
         password: ${{secrets.DOCKERHUB_TOKEN}}
     - name: build and push to docker hub
       uses: docker/build-push-action@v6
       with:
         context: .
         push: true
         tags: |
          ${{ vars.DOCKERHUB_USER }}/github-action-app:${{ github.head_ref || github.ref_name }}
          ${{ vars.DOCKERHUB_USER }}/github-action-app:latest
          ${{ vars.DOCKERHUB_USER }}/github-action-app:${{ github.sha }}
